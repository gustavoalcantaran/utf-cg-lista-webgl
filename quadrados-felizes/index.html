<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadrados Felizes</title>
  <link rel="stylesheet" href="estilos.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="../utils/code/errors.js"></script>
</head>
<body>
  <div>
    <h1>Quadrados felizes!</h1>
    <p>9 quadrados felizes.</p>
    <a href="../">Retornar</a>
  </div>
  <canvas class="example-canvas shadow" width="500" height="500"></canvas>
  <script type="shader/vertex">
    #version 300 es

    in vec2 posicao;
    uniform mat4 projecao;

    void main() {
        gl_Position = projecao * vec4(posicao, 0.0, 1.0);
    }
  </script>
  <script type="shader/fragment">
    #version 300 es

    precision highp float;
    uniform vec4 uColor;
    out vec4 outColor;

    void main() {
        outColor = uColor;
    }
  </script>
  <script type="module">
    import { setupWebGL, initialize, render } from './main.js';
    
    const gl = setupWebGL();
    initialize(gl);
    render(gl);

  </script>
</body>
</html>
